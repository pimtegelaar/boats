<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boats - Titanic Navigator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        #info p {
            margin: 5px 0;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🚢 Titanic Navigator</h2>
        <p>Controls:</p>
        <p><span class="key">W</span> - Move Forward</p>
        <p><span class="key">A</span> - Strafe Left</p>
        <p><span class="key">S</span> - Move Backward</p>
        <p><span class="key">D</span> - Strafe Right</p>
        <p><span class="key">SPACE</span> - Move Up</p>
        <p><span class="key">CTRL</span> - Move Down</p>
        <p><span class="key">LMB + Drag</span> - Look Around</p>
        <p><span class="key">Wheel</span> - Zoom In/Out</p>
        <p><span class="key">RMB + Drag</span> - Pan Camera</p>
        <hr style="margin: 10px 0; opacity: 0.3;">
        <p id="position">Position: (0, 0, 0)</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Boats.js"></script>
</body>
</html>
