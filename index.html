<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Cache-busting: force refresh on every visit -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Boats - Titanic Navigator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        canvas {
            touch-action: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            z-index: 90;
        }

        #top-right-controls {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            max-width: calc(100vw - 32px);
            z-index: 120;
        }

        #fullscreen-btn {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(216, 242, 255, 0.3);
            color: #d8f2ff;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            font-family: monospace;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(216, 242, 255, 0.6);
        }

        /* ── Joystick ── */
        #joystick-container {
            display: none; /* shown by JS on first touch */
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 100;
            touch-action: none;
            user-select: none;
        }
        #joystick-base {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 16px rgba(0,0,0,0.4);
        }
        #joystick-knob {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s;
        }

        @media (hover: none) and (pointer: coarse) {
            #info {
                display: none;
            }
        }

        @media (max-width: 640px) {
            #top-right-controls {
                gap: 8px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div id="top-right-controls">
        <button id="fullscreen-btn" title="Toggle fullscreen (F)">⛶</button>
    </div>

    <div id="info">
        <p id="position">Position: (0, 0, 0) | Status: Cruising</p>
    </div>

    <!-- Virtual joystick (shown on touch devices) -->
    <div id="joystick-container">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
    </div>

    <script>
        // Fullscreen functionality with mobile support
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        let canvas = null;

        // Wait for canvas to be created by THREE.js
        function getCanvas() {
            if (!canvas) {
                canvas = document.querySelector('canvas');
            }
            return canvas;
        }

        function isFullscreenActive() {
            return !!(document.fullscreenElement ||
                      document.webkitFullscreenElement ||
                      document.mozFullScreenElement ||
                      document.msFullscreenElement);
        }

        function updateFullscreenButtonText() {
            if (isFullscreenActive()) {
                fullscreenBtn.textContent = '⛶';
            } else {
                fullscreenBtn.textContent = '⛶';
            }
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => console.warn('Exit fullscreen failed:', err));
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }

        function showToast(text, durationMs) {
            const msg = document.createElement('div');
            msg.textContent = text;
            msg.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:99999;pointer-events:none;text-align:center;max-width:90vw;';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), durationMs || 3000);
        }

        function tryCssFullscreen() {
            // CSS-based pseudo-fullscreen fallback for browsers where the API doesn't work
            const el = document.documentElement;
            el.dataset.cssFs = '1';
            // Overlay the whole viewport
            document.body.style.cssText += ';position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;overflow:hidden!important;';
            fullscreenBtn.textContent = '⛶';
            fullscreenBtn.dataset.cssFs = '1';
            showToast('⚠ True fullscreen not supported — using fullscreen mode instead', 3500);
        }

        function exitCssFullscreen() {
            delete document.documentElement.dataset.cssFs;
            document.body.style.cssText = '';
            fullscreenBtn.textContent = '⛶';
            delete fullscreenBtn.dataset.cssFs;
        }

        function enterFullscreen() {
            // Always use documentElement — canvas fullscreen is unreliable on Android
            const element = document.documentElement;
            const api = element.requestFullscreen || element.webkitRequestFullscreen ||
                        element.mozRequestFullScreen || element.msRequestFullscreen;

            if (!api) {
                // No API at all — go straight to CSS fallback
                tryCssFullscreen();
                return;
            }

            // Call the API and verify it actually worked after a short delay,
            // because on Android it often resolves without doing anything.
            const promise = api.call(element);
            const checkResult = () => {
                if (!isFullscreenActive()) {
                    console.warn('Fullscreen API call did not activate fullscreen, falling back to CSS.');
                    tryCssFullscreen();
                }
            };

            if (promise && typeof promise.then === 'function') {
                promise.then(checkResult).catch(err => {
                    console.warn('requestFullscreen rejected:', err);
                    tryCssFullscreen();
                });
            } else {
                // Synchronous vendor prefix — check after a tick
                setTimeout(checkResult, 300);
            }
        }

        function toggleFullscreen() {
            if (fullscreenBtn.dataset.cssFs) {
                exitCssFullscreen();
            } else if (isFullscreenActive()) {
                exitFullscreen();
            } else {
                enterFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleFullscreen();
        });

        // F key to toggle fullscreen
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        // Update button text when fullscreen state changes
        const fullscreenEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'msfullscreenchange'];
        fullscreenEvents.forEach(eventName => {
            document.addEventListener(eventName, updateFullscreenButtonText);
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="TitanicMeshes.js?v=2026.04.19.2"></script>
    <script src="Boats.js?v=2026.04.19.6"></script>
</body>
</html>
